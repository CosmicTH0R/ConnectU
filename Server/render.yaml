# ─────────────────────────────────────────────────────────────────────────────
#  render.yaml — Render.com deployment config (free tier)
#
#  Free stack summary:
#    • Node.js services  → Render Web Services (free, 750 hrs/month)
#    • PostgreSQL        → Neon (free 0.5 GB)
#    • MongoDB           → MongoDB Atlas M0 (free 512 MB)
#    • Redis             → Upstash Redis (free 10K cmds/day)
#    • Kafka             → Upstash Kafka (free 10K msgs/day)
#    • Media/CDN         → Cloudinary (free 25 GB)
#    • Search            → PostgreSQL Full-Text Search (tsvector + GIN)
#
#  NOTE: Free services spin down after 15 min of inactivity.
#  For always-on behaviour upgrade to the $7/month Starter plan.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── API Gateway ─────────────────────────────────────────────────────────────
  - type: web
    name: instagram-api-gateway
    runtime: node
    rootDir: packages/api-gateway
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false
      # Service discovery — fill after each service deploys
      - key: USER_SERVICE_URL
        sync: false
      - key: POST_SERVICE_URL
        sync: false
      - key: FEED_SERVICE_URL
        sync: false
      - key: STORY_SERVICE_URL
        sync: false
      - key: CHAT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: MEDIA_SERVICE_URL
        sync: false
      - key: SEARCH_SERVICE_URL
        sync: false
      - key: RECOMMENDATION_SERVICE_URL
        sync: false
      - key: FEATURE_FLAG_SERVICE_URL
        sync: false
      - key: AB_TESTING_SERVICE_URL
        sync: false

  # ── User Service ─────────────────────────────────────────────────────────────
  - type: web
    name: instagram-user-svc
    runtime: node
    rootDir: packages/user-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false          # Neon PostgreSQL connection string
      - key: REDIS_URL
        sync: false          # Upstash Redis URL
      - key: KAFKA_BROKERS
        sync: false
      - key: KAFKA_USE_SASL
        value: "true"
      - key: KAFKA_SASL_USERNAME
        sync: false
      - key: KAFKA_SASL_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: "7d"

